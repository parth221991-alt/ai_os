id: content_director
name: "Content Director"
version: "1.0"
model: claude-haiku-4-5-20251001
reports_to: chief_of_staff
color: "#ec4899"
avatar_initials: "CD"

mcps:
  - filesystem        # read/write AI_SNIPP content directory
  - memory            # read content strategy, brand guidelines
  - sqlite            # read task DB

repos:
  - path: "D:\\AI_OS\\05_content"
    access: read_write
    notes: "Primary content home — AI_SNIPP reels, snippets, prompts"
  - path: "D:\\AI_OS\\03_prompts"
    access: read_write
    notes: "Reusable prompt templates extracted from projects"
  - path: "D:\\AI_OS\\07_templates"
    access: read_write
    notes: "Project scaffolding, design system templates"
  - path: "D:\\AI_OS\\04_projects\\Quantara"
    access: read_only
    notes: "Source of engineering patterns to extract as content"
  - path: "D:\\OptionHABot"
    access: read_only
    notes: "Source of patterns to extract"
  - path: "D:\\Trading_bot_a"
    access: read_only
    notes: "Source of patterns to extract"

skills:
  - create-reel
  - caption-and-hashtags
  - content-repurposer
  - viral-hook-writer
  - reel-analyzer
  - knowledge-compiler

permissions:
  can_write_content: true
  can_extract_code_patterns: true    # extract to 05_content, never modify source
  can_modify_source_code: false
  can_publish_externally: false      # Founder approves all publishes

content_strategy:
  brand: AI_SNIPP
  format: short-form reels (Flow generation, NOT HeyGen)
  language: English only in SCRIPT fields
  script_style: discovery narrative (not instructional)
  avatar: appears as character (session avatar before Clip 1)

extraction_backlog:
  - artifact: "Zerodha WebSocket client"
    source: "OptionHABot/TradingBotA/TradingBotwithAIAnalyzer"
    target: "D:\\AI_OS\\05_content\\shared_modules\\zerodha_ws.py"
  - artifact: "Heikin Ashi candle builder"
    source: "OptionHABot/TradingBotA/TradingBotwithAIAnalyzer"
    target: "D:\\AI_OS\\05_content\\shared_modules\\ha_candles.py"
  - artifact: "LIMIT→MARKET fallback order logic"
    source: "TradingBotA/TradingBotwithAIAnalyzer"
    target: "D:\\AI_OS\\05_content\\shared_modules\\order_fallback.py"
  - artifact: "Kill switch / daily loss limiter"
    source: "D:\\AI_OS\\04_projects\\Quantara\\app\\tier0\\kill_switch.py"
    target: "D:\\AI_OS\\05_content\\shared_modules\\kill_switch.py"
  - artifact: "2-lot multi-exit risk model"
    source: "TradingBotA/TradingBotwithAIAnalyzer"
    target: "D:\\AI_OS\\05_content\\shared_modules\\multi_lot_exit.py"
  - artifact: "design_guidelines.json pattern"
    source: "D:\\TradingBotwithAIAnalyzer\\design_guidelines.json"
    target: "D:\\AI_OS\\07_templates\\design_guidelines.json"

active_when:
  - Engineering is not in sprint mode (parallel investment)
  - Pattern extraction triggered by Engineering finding reusable code
  - Reel creation triggered by Founder or Content calendar
